openapi: 3.0.3
info:
  title: API Sistema de Gestión de Encomiendas
  version: 1.0.0
  description: |2

     API REST para gestionar el ciclo de vida de encomiendas.
     Incluye registro de envíos, cambio de estado, historial y estadísticas del sistema.
paths:
  /api/v1/auth/token/:
    post:
      operationId: v1_auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/clientes/:
    get:
      operationId: v1_clientes_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a devolver por página.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClienteList'
          description: ''
  /api/v1/rutas/:
    get:
      operationId: v1_rutas_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ruta'
          description: ''
  /api/v1/encomiendas/:
    get:
      operationId: v1_encomiendas_list
      parameters:
      - in: query
        name: con_retraso
        schema:
          type: string
      - in: query
        name: desde
        schema:
          type: string
      - in: query
        name: estado
        schema:
          type: string
          enum:
          - DE
          - DV
          - EN
          - PE
          - TR
        description: |-
          * `PE` - Pendiente
          * `TR` - En tránsito
          * `DE` - En destino
          * `EN` - Entregado
          * `DV` - Devuelto
      - in: query
        name: hasta
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a devolver por página.
        schema:
          type: integer
      - in: query
        name: remitente
        schema:
          type: string
      - in: query
        name: ruta
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEncomiendaList'
          description: ''
    post:
      operationId: v1_encomiendas_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/encomiendas/con_retraso/:
    get:
      operationId: v1_encomiendas_con_retraso_retrieve
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/encomiendas/estadisticas/:
    get:
      operationId: v1_encomiendas_estadisticas_retrieve
      description: |-
        GET /api/v1/encomiendas/estadisticas/
        Devuelve contadores globales (no requiere paginacion).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/encomiendas/pendientes/:
    get:
      operationId: v1_encomiendas_pendientes_retrieve
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/encomiendas/{id}/:
    patch:
      operationId: v1_encomiendas_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEncomiendaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEncomiendaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEncomiendaRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
    get:
      operationId: v1_encomiendas_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncomiendaDetail'
          description: ''
    put:
      operationId: v1_encomiendas_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
    delete:
      operationId: v1_encomiendas_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/encomiendas/{id}/cambiar_estado/:
    post:
      operationId: v1_encomiendas_cambiar_estado_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EncomiendaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/encomiendas/{id}/historial/:
    get:
      operationId: v1_encomiendas_historial_retrieve
      description: |-
        GET /api/v1/encomiendas/{pk}/historial/
        GET /api/v1/encomiendas/{pk}/historial/?limit=5&offset=10
        Devuelve el historial de cambios de estado paginado.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un valor de entero único que identifique este Encomienda.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomienda'
          description: ''
  /api/v1/auth/token/blacklist/:
    post:
      operationId: v1_auth_token_blacklist_create
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
        required: true
      responses:
        '200':
          description: No response body
components:
  schemas:
    Cliente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tipo_doc:
          $ref: '#/components/schemas/TipoDocEnum'
        nro_doc:
          type: string
          maxLength: 15
        nombres:
          type: string
          maxLength: 100
        apellidos:
          type: string
          maxLength: 100
        nombre_completo:
          type: string
          readOnly: true
        telefono:
          type: string
          nullable: true
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        esta_activo:
          type: string
          readOnly: true
      required:
      - apellidos
      - esta_activo
      - id
      - nombre_completo
      - nombres
      - nro_doc
    Encomienda:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        codigo:
          type: string
          readOnly: true
        descripcion:
          type: string
        descripcion_corta:
          type: string
          readOnly: true
        peso_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        volumen_cm3:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        costo_envio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        remitente:
          type: integer
        destinatario:
          type: integer
        ruta:
          type: integer
        empleado_registro:
          type: integer
        estado:
          $ref: '#/components/schemas/Estado4bdEnum'
        estado_display:
          type: string
          readOnly: true
        fecha_registro:
          type: string
          format: date-time
          readOnly: true
        fecha_entrega_est:
          type: string
          format: date
          nullable: true
        fecha_entrega_real:
          type: string
          format: date
          readOnly: true
          nullable: true
        esta_entregada:
          type: string
          readOnly: true
        tiene_retraso:
          type: string
          readOnly: true
        dias_en_transito:
          type: string
          readOnly: true
        observaciones:
          type: string
          nullable: true
      required:
      - codigo
      - costo_envio
      - descripcion
      - descripcion_corta
      - destinatario
      - dias_en_transito
      - empleado_registro
      - esta_entregada
      - estado_display
      - fecha_entrega_real
      - fecha_registro
      - id
      - peso_kg
      - remitente
      - ruta
      - tiene_retraso
    EncomiendaDetail:
      type: object
      description: |-
        Para GET: devuelve objetos anidados completos
        Para POST/PUT/PATCH: acepta solo IDs (write_only)
      properties:
        id:
          type: integer
          readOnly: true
        codigo:
          type: string
          maxLength: 20
        descripcion:
          type: string
        peso_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        remitente:
          allOf:
          - $ref: '#/components/schemas/Cliente'
          readOnly: true
        destinatario:
          allOf:
          - $ref: '#/components/schemas/Cliente'
          readOnly: true
        ruta:
          allOf:
          - $ref: '#/components/schemas/Ruta'
          readOnly: true
        estado:
          $ref: '#/components/schemas/Estado4bdEnum'
        costo_envio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        fecha_registro:
          type: string
          format: date-time
          readOnly: true
        fecha_entrega_est:
          type: string
          format: date
          nullable: true
        fecha_entrega_real:
          type: string
          format: date
          nullable: true
        esta_entregada:
          type: string
          readOnly: true
        tiene_retraso:
          type: string
          readOnly: true
        dias_en_transito:
          type: string
          readOnly: true
        historial:
          type: string
          readOnly: true
        observaciones:
          type: string
          nullable: true
      required:
      - codigo
      - costo_envio
      - descripcion
      - destinatario
      - dias_en_transito
      - esta_entregada
      - fecha_registro
      - historial
      - id
      - peso_kg
      - remitente
      - ruta
      - tiene_retraso
    EncomiendaRequest:
      type: object
      properties:
        descripcion:
          type: string
          minLength: 1
        peso_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        volumen_cm3:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        costo_envio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        remitente:
          type: integer
        destinatario:
          type: integer
        ruta:
          type: integer
        empleado_registro:
          type: integer
        estado:
          $ref: '#/components/schemas/Estado4bdEnum'
        fecha_entrega_est:
          type: string
          format: date
          nullable: true
        observaciones:
          type: string
          nullable: true
      required:
      - costo_envio
      - descripcion
      - destinatario
      - empleado_registro
      - peso_kg
      - remitente
      - ruta
    Estado4bdEnum:
      enum:
      - PE
      - TR
      - DE
      - EN
      - DV
      type: string
      description: |-
        * `PE` - Pendiente
        * `TR` - En tránsito
        * `DE` - En destino
        * `EN` - Entregado
        * `DV` - Devuelto
    PaginatedClienteList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Cliente'
    PaginatedEncomiendaList:
      type: object
      properties:
        count:
          type: integer
          example: 120
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Encomienda'
    PatchedEncomiendaRequest:
      type: object
      properties:
        descripcion:
          type: string
          minLength: 1
        peso_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        volumen_cm3:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        costo_envio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        remitente:
          type: integer
        destinatario:
          type: integer
        ruta:
          type: integer
        empleado_registro:
          type: integer
        estado:
          $ref: '#/components/schemas/Estado4bdEnum'
        fecha_entrega_est:
          type: string
          format: date
          nullable: true
        observaciones:
          type: string
          nullable: true
    Ruta:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        codigo:
          type: string
          maxLength: 10
        origen:
          type: string
          maxLength: 100
        destino:
          type: string
          maxLength: 100
        precio_base:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        dias_entrega:
          type: integer
          maximum: 2147483647
          minimum: 0
        estado:
          allOf:
          - $ref: '#/components/schemas/RutaEstadoEnum'
          minimum: -2147483648
          maximum: 2147483647
      required:
      - codigo
      - destino
      - id
      - origen
      - precio_base
    RutaEstadoEnum:
      enum:
      - 1
      - 9
      type: integer
      description: |-
        * `1` - Activo
        * `9` - De baja
    TipoDocEnum:
      enum:
      - DNI
      - RUC
      - PAS
      type: string
      description: |-
        * `DNI` - DNI
        * `RUC` - RUC
        * `PAS` - Pasaporte
    TokenBlacklistRequest:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - refresh
    TokenObtainPair:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    TokenObtainPairRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Encomiendas
  description: Gestión de envíos
- name: Clientes
  description: Listado de clientes activos
- name: Rutas
  description: Rutas disponibles
- name: Auth
  description: Autenticación JWT
